<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blake Richardson — Pre-Save</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #000; color: #fff; }
    .container { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .content { max-width: 600px; padding: 40px 20px; }
    h1 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 700; }
    p { font-size: 1.1rem; margin-bottom: 30px; opacity: 0.9; }
    .pre-save-btn {
      display: inline-block;
      padding: 16px 40px;
      background: #1db954;
      color: white;
      text-decoration: none;
      border-radius: 500px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .pre-save-btn:hover { background: #1ed760; transform: scale(1.05); }
    .status { margin-top: 60px; font-size: 0.9rem; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1>Blake Richardson</h1>
      <p>New music coming soon. Pre-save now to be the first to hear it.</p>
      <a href="https://fanengage-pro.onrender.com/blake-richardson" class="pre-save-btn">Pre-Save</a>
      <div class="status">Live now</div>
    </div>
  </div>
</body>
</html>
